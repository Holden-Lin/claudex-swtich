name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release assets
        run: ./scripts/build-release-assets.sh ./release

      - name: Render Homebrew formula
        run: |
          mkdir -p Formula
          ./scripts/render-formula.sh "${GITHUB_REF_NAME}" ./release > ./release/claudex-switch.rb

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" ./release/*.tar.gz ./release/checksums.txt ./release/claudex-switch.rb --clobber
          else
            gh release create "${GITHUB_REF_NAME}" ./release/*.tar.gz ./release/checksums.txt ./release/claudex-switch.rb --generate-notes
          fi

      - name: Update formula on main
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main
          git checkout main
          mkdir -p Formula
          cp ./release/claudex-switch.rb ./Formula/claudex-switch.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/claudex-switch.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "release: update Homebrew formula for ${GITHUB_REF_NAME}"
          git push origin HEAD:main
